<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X - Gym</title>

<style>
    body {
        margin: 0;
        background: #050505;
        font-family: 'Poppins', sans-serif;
        overflow-x: hidden;
        color: white;
    }

    /* Layered particle canvases */
    canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: -3;
    }

    #p1 { z-index: -3; opacity: 0.4; }
    #p2 { z-index: -2; opacity: 0.6; }
    #p3 { z-index: -1; opacity: 0.9; }

    /* Hero Section */
    .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 0 20px;
        position: relative;
    }

    /* Animated gradient glow */
    .hero::before {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(255,0,80,0.5), transparent 70%);
        filter: blur(120px);
        animation: glow 6s infinite alternate ease-in-out;
        z-index: -1;
    }

    @keyframes glow {
        0% { transform: translate(-100px, -80px) scale(1); }
        100% { transform: translate(100px, 80px) scale(1.3); }
    }

    .hero h1 {
        font-size: 5rem;
        font-weight: 900;
        letter-spacing: 6px;
        text-transform: uppercase;
        margin: 0;
    }

    .hero p {
        font-size: 1.3rem;
        max-width: 600px;
        opacity: 0.8;
        margin-top: 20px;
    }

    /* Magnetic Button */
    .cta {
        margin-top: 40px;
        padding: 18px 50px;
        background: linear-gradient(90deg, #ff0033, #ff5500);
        border: none;
        border-radius: 8px;
        font-size: 1.2rem;
        color: white;
        cursor: pointer;
        transition: transform 0.2s ease;
        position: relative;
        overflow: hidden;
    }

    .cta:hover {
        transform: scale(1.08);
    }

    /* Section below hero */
    .content {
        padding: 120px 40px;
        max-width: 900px;
        margin: auto;
        text-align: center;
    }

    .content h2 {
        font-size: 3rem;
        margin-bottom: 20px;
    }

    .content p {
        font-size: 1.2rem;
        opacity: 0.8;
        line-height: 1.7;
    }
    /* Cinematic Login/Register Menu */
.auth-menu {
    position: fixed;
    top: 25px;
    left: 25px;
    display: flex;
    gap: 20px;
    padding: 12px 22px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    z-index: 10;
    box-shadow: 0 0 25px rgba(255, 0, 60, 0.25);
    opacity: 0;
    transform: translateY(-20px);
}

.auth-link {
    color: white;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;
    position: relative;
    transition: 0.3s ease;
}

/* Hover glow */
.auth-link::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, #ff0033, #ff5500);
    transition: width 0.3s ease;
}

.auth-link:hover::after {
    width: 100%;
}

.auth-link:hover {
    color: #ff4d4d;
    transform: translateY(-2px);
}

</style>
</head>

<body>
    <div class="auth-menu">
    <a href="#" class="auth-link">Login</a>
    <a href="#" class="auth-link">Register</a>
    </div>


<!-- Particle layers -->
<canvas id="p1"></canvas>
<canvas id="p2"></canvas>
<canvas id="p3"></canvas>

<section class="hero">
    <h1 id="title">X GYM</h1>
    <p>Strength. Discipline. Power. Your transformation starts here.</p>
    <button class="cta" id="cta">Training Yourself and Become the Greatest</button>

</section>

<section class="content">
    <h2>Elite Training Environment</h2>
    <p>
        Our facility combines cutting‑edge equipment, expert coaching, and an atmosphere built for champions.
        Every rep, every set, every drop of sweat moves you closer to your strongest self.
    </p>
</section>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script>
/* ---------------------------
   >>>>>>MULTI-LAYER PARTICLE FIELD 
----------------------------*/
function particleLayer(canvas, count, speed) {
    const ctx = canvas.getContext("2d");
    let w, h;

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    const particles = [];
    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            size: Math.random() * 2 + 1,
            vx: (Math.random() - 0.5) * speed,
            vy: (Math.random() - 0.5) * speed
        });
    }

    function animate() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;

            if (p.x < 0) p.x = w;
            if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h;
            if (p.y > h) p.y = 0;

            ctx.fillStyle = "rgba(255, 0, 60, 0.8)";
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    animate();
}

particleLayer(document.getElementById("p1"), 40, 0.2);
particleLayer(document.getElementById("p2"), 70, 0.4);
particleLayer(document.getElementById("p3"), 110, 0.7);

/* ---------------------------
   GSAP ANIMATIONS
----------------------------*/
gsap.from("#title", {
    y: -100,
    opacity: 0,
    duration: 1.4,
    ease: "power4.out"
});

gsap.from(".hero p", {
    y: 40,
    opacity: 0,
    delay: 0.3,
    duration: 1.2,
    ease: "power3.out"
});

gsap.from("#cta", {
    scale: 0.5,
    opacity: 0,
    delay: 0.6,
    duration: 1.2,
    ease: "elastic.out(1, 0.5)"
});

/* Scroll-triggered section animation */
gsap.from(".content h2", {
    scrollTrigger: ".content",
    y: 80,
    opacity: 0,
    duration: 1.2,
    ease: "power3.out"
});

gsap.from(".content p", {
    scrollTrigger: ".content",
    y: 40,
    opacity: 0,
    delay: 0.2,
    duration: 1.2,
    ease: "power3.out"
});
gsap.to(".auth-menu", {
    opacity: 1,
    y: 0,
    duration: 1.4,
    ease: "power3.out",
    delay: 0.2
});

</script>

</body>
