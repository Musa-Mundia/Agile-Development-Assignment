<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messaging App</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ── Reset & tokens ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  /* shared dark palette */
  --bg:        #0f1117;
  --surface:   #181c27;
  --surface2:  #1e2333;
  --border:    #2a2f45;
  --accent:    #e84040;
  --accent2:   #7c5cfc;
  --text:      #e8eaf0;
  --muted:     #6b718a;
  --tag-bg:    #2c2060;
  --tag-bdr:   #5a4dbd;
  --yellow:    #f5c518;
  --green:     #2ee89a;
  --mono: 'Space Mono', monospace;
  --body: 'DM Sans', sans-serif;

  /* client light palette */
  --cl-bg:       #f4f6fb;
  --cl-surface:  #ffffff;
  --cl-border:   #e2e6f0;
  --cl-accent:   #7c5cfc;
  --cl-accent2:  #e84040;
  --cl-text:     #1a1d2e;
  --cl-muted:    #7b82a0;
  --cl-tag-bg:   #ede9ff;
  --cl-tag-bdr:  #c4b8ff;
}

body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ════════════════════════════════
   VIEW SWITCHER
════════════════════════════════ */
.view-switcher {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 0 8px;
  background: #0a0c12;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}

.switcher-label {
  font-family: var(--mono);
  font-size: .68rem;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 0 8px;
}

.switch-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 18px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: var(--body);
  font-size: .8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .18s;
}

.switch-btn:hover { color: var(--text); border-color: #454a66; }
.switch-btn.active {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent2);
}

.switch-btn.client-btn.active {
  background: #ede9ff;
  color: #4a2fcc;
  border-color: var(--accent2);
}

/* ════════════════════════════════
   PANELS WRAPPER
════════════════════════════════ */
.panels { flex: 1; overflow: hidden; position: relative; }

.panel {
  position: absolute;
  inset: 0;
  display: flex;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}

.panel.visible {
  opacity: 1;
  pointer-events: all;
}

/* ════════════════════════════════
   SHARED UTILITIES
════════════════════════════════ */
.scrollable {
  overflow-y: auto;
  flex: 1;
}
.scrollable::-webkit-scrollbar { width: 5px; }
.scrollable::-webkit-scrollbar-track { background: transparent; }
.scrollable::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@keyframes slideIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeOut {
  to { opacity:0; transform:scale(.97); max-height:0; padding:0; margin:0; }
}

/* ════════════════════════════════
   ADMIN PANEL
════════════════════════════════ */
#adminPanel { background: var(--bg); }

/* sidebar */
.adm-sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 0;
}

.adm-logo {
  font-family: var(--mono);
  font-size: .9rem;
  color: var(--yellow);
  padding: 0 20px 24px;
  border-bottom: 1px solid var(--border);
  letter-spacing: .04em;
}

.adm-nav { padding: 16px 0; flex: 1; }

.adm-nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  color: var(--muted);
  text-decoration: none;
  font-size: .82rem;
  font-weight: 500;
  cursor: pointer;
  transition: color .15s, background .15s;
}
.adm-nav a:hover { color: var(--text); background: var(--surface2); }
.adm-nav a.active { color: var(--text); background: var(--surface2); border-left: 3px solid var(--accent2); }

/* main */
.adm-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.adm-header {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.adm-title {
  font-family: var(--mono);
  font-size: .9rem;
  font-weight: 700;
}
.adm-title .cnt { color: var(--yellow); }

.btn-del-sel {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 6px;
  font-family: var(--body);
  font-size: .75rem;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.btn-del-sel:hover { opacity: .85; }
.btn-del-sel:active { transform: scale(.97); }
.btn-del-sel:disabled { opacity: .35; cursor: not-allowed; }

.adm-list {
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* admin card */
.adm-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  animation: slideIn .28s ease both;
  transition: border-color .2s, box-shadow .2s;
}
.adm-card.selected { border-color: var(--accent2); box-shadow: 0 0 0 1px var(--accent2); }
.adm-card.deleting { animation: fadeOut .32s ease forwards; }

.adm-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 14px 18px 10px;
  gap: 10px;
}
.adm-meta { display: flex; flex-direction: column; gap: 7px; flex: 1; }
.adm-date {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--muted);
}
.adm-tags { display: flex; gap: 7px; flex-wrap: wrap; }
.adm-tag {
  background: var(--tag-bg);
  border: 1px solid var(--tag-bdr);
  border-radius: 5px;
  padding: 3px 10px;
  font-family: var(--mono);
  font-size: .72rem;
  color: #c4b8ff;
  display: flex;
  align-items: center;
  gap: 5px;
}

.sel-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s;
}
.sel-dot:hover { border-color: var(--accent); }
.adm-card.selected .sel-dot { background: var(--accent); border-color: var(--accent); }
.sel-dot svg { display: none; }
.adm-card.selected .sel-dot svg { display: block; }

.adm-sender {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
}
.adm-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.adm-sname { font-size: .82rem; font-weight: 600; }
.adm-sgender { font-size: .72rem; color: var(--muted); }

.adm-body {
  padding: 12px 18px 14px;
  font-size: .82rem;
  line-height: 1.65;
  color: #b0b5cc;
  border-top: 1px solid var(--border);
}
.adm-read-more {
  color: var(--yellow);
  font-weight: 600;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--body);
  font-size: .82rem;
  transition: opacity .15s;
}
.adm-read-more:hover { opacity: .7; }

/* compose */
.adm-compose {
  border-top: 1px solid var(--border);
  padding: 16px 28px;
  background: var(--surface);
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.adm-compose input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 9px 13px;
  color: var(--text);
  font-family: var(--body);
  font-size: .82rem;
  outline: none;
  transition: border-color .15s;
}
.adm-compose input:focus { border-color: var(--accent2); }
.adm-compose input::placeholder { color: var(--muted); }
.btn-adm-add {
  background: var(--accent2);
  color: #fff;
  border: none;
  padding: 9px 18px;
  border-radius: 7px;
  font-family: var(--body);
  font-size: .8rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-adm-add:hover { opacity: .85; }

/* ════════════════════════════════
   CLIENT PANEL
════════════════════════════════ */
#clientPanel { background: var(--cl-bg); color: var(--cl-text); }

/* client sidebar */
.cl-sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--cl-surface);
  border-right: 1px solid var(--cl-border);
  display: flex;
  flex-direction: column;
}

.cl-sidebar-top {
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--cl-border);
}

.cl-logo {
  font-family: var(--mono);
  font-size: .85rem;
  color: var(--cl-accent);
  margin-bottom: 16px;
  letter-spacing: .03em;
}

.cl-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--cl-bg);
  border: 1px solid var(--cl-border);
  border-radius: 8px;
  padding: 8px 12px;
}
.cl-search input {
  border: none;
  background: transparent;
  outline: none;
  font-family: var(--body);
  font-size: .8rem;
  color: var(--cl-text);
  width: 100%;
}
.cl-search input::placeholder { color: var(--cl-muted); }

.cl-thread-list { flex: 1; overflow-y: auto; }
.cl-thread-list::-webkit-scrollbar { width: 4px; }
.cl-thread-list::-webkit-scrollbar-thumb { background: var(--cl-border); border-radius: 2px; }

.cl-thread {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--cl-border);
  cursor: pointer;
  transition: background .15s;
}
.cl-thread:hover { background: var(--cl-bg); }
.cl-thread.active { background: #ede9ff; border-left: 3px solid var(--cl-accent); }

.cl-t-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: .75rem;
  font-weight: 700;
  color: #fff;
}

.cl-t-info { flex: 1; min-width: 0; }
.cl-t-name { font-size: .83rem; font-weight: 600; color: var(--cl-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cl-t-preview { font-size: .74rem; color: var(--cl-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.cl-t-date { font-family: var(--mono); font-size: .66rem; color: var(--cl-muted); flex-shrink: 0; }

.cl-unread {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--cl-accent);
  flex-shrink: 0;
}

/* client main */
.cl-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.cl-chat-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--cl-border);
  background: var(--cl-surface);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.cl-ch-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: .78rem;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}
.cl-ch-name { font-size: .9rem; font-weight: 600; }
.cl-ch-status { font-size: .74rem; color: var(--cl-muted); display: flex; align-items: center; gap: 5px; margin-top: 1px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
.cl-ch-actions { margin-left: auto; display: flex; gap: 8px; }
.cl-icon-btn {
  background: var(--cl-bg);
  border: 1px solid var(--cl-border);
  border-radius: 7px;
  padding: 7px;
  cursor: pointer;
  color: var(--cl-muted);
  display: flex; align-items: center; justify-content: center;
  transition: color .15s, border-color .15s;
}
.cl-icon-btn:hover { color: var(--cl-text); border-color: #bbb; }

/* conversation */
.cl-conversation {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  background: var(--cl-bg);
}
.cl-conversation::-webkit-scrollbar { width: 4px; }
.cl-conversation::-webkit-scrollbar-thumb { background: var(--cl-border); border-radius: 2px; }

.cl-day-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--cl-muted);
  font-size: .72rem;
  font-family: var(--mono);
}
.cl-day-divider::before, .cl-day-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--cl-border);
}

/* bubbles */
.cl-bubble-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  animation: slideIn .22s ease both;
}
.cl-bubble-row.from-client { flex-direction: row-reverse; }

.cl-bubble-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: .65rem;
  font-weight: 700;
  color: #fff;
}

.cl-bubble {
  max-width: 65%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: .83rem;
  line-height: 1.6;
  position: relative;
}
.cl-bubble-row:not(.from-client) .cl-bubble {
  background: var(--cl-surface);
  border: 1px solid var(--cl-border);
  color: var(--cl-text);
  border-bottom-left-radius: 4px;
}
.cl-bubble-row.from-client .cl-bubble {
  background: var(--cl-accent);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.cl-bubble-time {
  font-size: .65rem;
  color: var(--cl-muted);
  margin-top: 3px;
  padding: 0 2px;
  text-align: right;
}
.cl-bubble-row.from-client .cl-bubble-time { text-align: left; }

/* empty convo */
.cl-empty-convo {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--cl-muted);
  gap: 10px;
  font-size: .85rem;
}

/* contact form area */
.cl-form-area {
  border-top: 1px solid var(--cl-border);
  padding: 18px 24px;
  background: var(--cl-surface);
  flex-shrink: 0;
}

.cl-form-area.compose-mode { padding: 14px 24px; }

.cl-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.cl-field { display: flex; flex-direction: column; gap: 4px; }
.cl-field label { font-size: .72rem; font-weight: 600; color: var(--cl-muted); text-transform: uppercase; letter-spacing: .05em; }
.cl-field input, .cl-field select {
  background: var(--cl-bg);
  border: 1px solid var(--cl-border);
  border-radius: 7px;
  padding: 8px 11px;
  font-family: var(--body);
  font-size: .82rem;
  color: var(--cl-text);
  outline: none;
  transition: border-color .15s;
}
.cl-field input:focus, .cl-field select:focus { border-color: var(--cl-accent); }
.cl-field input::placeholder { color: var(--cl-muted); }

.cl-compose-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.cl-compose-row textarea {
  flex: 1;
  background: var(--cl-bg);
  border: 1px solid var(--cl-border);
  border-radius: 9px;
  padding: 9px 13px;
  font-family: var(--body);
  font-size: .82rem;
  color: var(--cl-text);
  outline: none;
  resize: none;
  height: 48px;
  transition: border-color .15s, height .15s;
  line-height: 1.5;
}
.cl-compose-row textarea:focus { border-color: var(--cl-accent); height: 80px; }
.cl-compose-row textarea::placeholder { color: var(--cl-muted); }

.btn-cl-send {
  background: var(--cl-accent);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 9px;
  font-family: var(--body);
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: opacity .15s, transform .1s;
  flex-shrink: 0;
}
.btn-cl-send:hover { opacity: .88; }
.btn-cl-send:active { transform: scale(.97); }

.cl-form-note {
  font-size: .72rem;
  color: var(--cl-muted);
  margin-top: 8px;
  text-align: center;
}

/* new thread btn */
.cl-new-thread {
  display: flex;
  align-items: center;
  gap: 7px;
  margin: 10px 18px;
  padding: 8px 14px;
  background: var(--cl-accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: var(--body);
  font-size: .8rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}
.cl-new-thread:hover { opacity: .88; }

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  max-width: 520px;
  width: 90%;
  padding: 26px;
  position: relative;
  animation: slideIn .22s ease;
}
.modal h3 { font-family: var(--mono); font-size: .88rem; margin-bottom: 12px; }
.modal p { font-size: .83rem; line-height: 1.7; color: #b0b5cc; }
.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 1.1rem; line-height: 1; padding: 4px;
  transition: color .15s;
}
.modal-close:hover { color: var(--text); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--green);
  color: #0a0a0a;
  padding: 11px 18px;
  border-radius: 8px;
  font-size: .82rem;
  font-weight: 600;
  z-index: 300;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity .28s, transform .28s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- VIEW SWITCHER -->
<div class="view-switcher">
  <span class="switcher-label">View as</span>
  <button class="switch-btn active" id="btnAdminView">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Admin
  </button>
  <button class="switch-btn client-btn" id="btnClientView">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Client
  </button>
</div>

<div class="panels">

  <!-- ══════ ADMIN PANEL ══════ -->
  <div class="panel visible" id="adminPanel">
    <!-- sidebar -->
    <aside class="adm-sidebar">
      <div class="adm-logo">AdminPanel</div>
      <nav class="adm-nav">
        <a href="#" class="adm-nav-link">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="#" class="adm-nav-link active">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          View Messages
        </a>
        <a href="#" class="adm-nav-link">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
          Register Account
        </a>
        <a href="#" class="adm-nav-link">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Update Account
        </a>
        <a href="#" class="adm-nav-link">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          View Admins
        </a>
      </nav>
    </aside>

    <!-- main area -->
    <div class="adm-main">
      <div class="adm-header">
        <div class="adm-title">
          Messages &nbsp;( Total : <span class="cnt" id="admCount">0</span> )
        </div>
        <button class="btn-del-sel" id="btnDelSel" disabled>Delete Selected</button>
      </div>

      <div class="scrollable">
        <div class="adm-list" id="admList"></div>
      </div>

      <div class="adm-compose">
        <input type="text" id="admComposeInput" placeholder="Inject a test message…" />
        <button class="btn-adm-add" id="btnAdmAdd">+ Add</button>
      </div>
    </div>
  </div><!-- /adminPanel -->

  <!-- ══════ CLIENT PANEL ══════ -->
  <div class="panel" id="clientPanel">
    <!-- sidebar: thread list -->
    <div class="cl-sidebar">
      <div class="cl-sidebar-top">
        <div class="cl-logo">Inbox</div>
        <div class="cl-search">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="clSearch" placeholder="Search messages…" />
        </div>
      </div>
      <div class="cl-thread-list" id="clThreadList"></div>
      <button class="cl-new-thread" id="btnNewThread">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Message
      </button>
    </div>

    <!-- main: conversation + form -->
    <div class="cl-main">
      <!-- chat header (hidden when no thread selected) -->
      <div class="cl-chat-header" id="clChatHeader" style="display:none">
        <div class="cl-ch-avatar" id="clChAvatar"></div>
        <div>
          <div class="cl-ch-name" id="clChName"></div>
          <div class="cl-ch-status"><span class="status-dot"></span> Online</div>
        </div>
        <div class="cl-ch-actions">
          <button class="cl-icon-btn" title="Info">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </button>
        </div>
      </div>

      <!-- empty state (new thread or no selection) -->
      <div class="cl-empty-convo" id="clEmptyState">
        <svg width="52" height="52" fill="none" viewBox="0 0 24 24" stroke="#c4b8ff" stroke-width="1.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span style="color:#7b82a0">Select a conversation or send a new message</span>
      </div>

      <!-- conversation bubbles -->
      <div class="cl-conversation scrollable" id="clConversation" style="display:none"></div>

      <!-- form area -->
      <div class="cl-form-area" id="clFormArea">
        <!-- New message form (default) -->
        <div id="clNewForm">
          <div class="cl-form-grid">
            <div class="cl-field">
              <label>Your Name</label>
              <input type="text" id="clName" placeholder="e.g. Jane Smith" />
            </div>
            <div class="cl-field">
              <label>Gender</label>
              <select id="clGender">
                <option value="Female">Female</option>
                <option value="Male">Male</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="cl-field">
              <label>Email</label>
              <input type="email" id="clEmail" placeholder="you@example.com" />
            </div>
            <div class="cl-field">
              <label>Phone</label>
              <input type="tel" id="clPhone" placeholder="+44 7000 000000" />
            </div>
          </div>
          <div class="cl-compose-row">
            <textarea id="clMessage" placeholder="Write your message…"></textarea>
            <button class="btn-cl-send" id="btnClSend">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Send
            </button>
          </div>
          <div class="cl-form-note">Your message will be reviewed by our team.</div>
        </div>

        <!-- Reply compose (shown when thread open) -->
        <div id="clReplyForm" style="display:none">
          <div class="cl-compose-row">
            <textarea id="clReplyMsg" placeholder="Type a reply…"></textarea>
            <button class="btn-cl-send" id="btnClReply">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Reply
            </button>
          </div>
        </div>
      </div>
    </div>
  </div><!-- /clientPanel -->

</div><!-- /panels -->

<!-- Read-More Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h3 id="modalSender"></h3>
    <p id="modalBody"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════════
   SHARED DATA STORE
══════════════════════════════════════════════════════════ */
const COLORS = ['#7c5cfc','#e84040','#2980b9','#27ae60','#e67e22','#8e44ad','#16a085'];
function colorFor(str) { let h=0; for(let c of str) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function initials(name) { return name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase(); }

const MessageStore = (() => {
  let _messages = [
    { id:1, date:'17 Dec 2025', time:'09:14', email:'anas@gmail.com', phone:'0987654321', sender:'Sk Anas', gender:'Male',
      body:'LorLorem, ipsum dolor sit amet consectetur adipisicing elit. Deleniti repellat sit numquam eaque dolor officiis ipsum distinctio nulla praesentium minus?' },
    { id:2, date:'17 Dec 2025', time:'11:02', email:'anasbhai@gmail.com', phone:'1234567890', sender:'Anas-2', gender:'Male',
      body:'LorLorem, ipsum dolor sit amet consectetur adipisicing elit. Deleniti repellat sit numquam eaque dolor officiis ipsum distinctio nulla praesentium minus? Lorem, ipsum dolor sit amet consectetur adi nulla consequuntur perspiciatis expedita nesciunt saepe distinctio voluptatibus laborum voluptate.' },
    { id:3, date:'18 Dec 2025', time:'14:33', email:'zara@example.com', phone:'9876001234', sender:'Zara Khan', gender:'Female',
      body:'Hello admin, I wanted to follow up on my earlier support request. The issue seems to persist even after the suggested fix. Could you please escalate this to the technical team? I appreciate your help.' },
  ];

  // replies keyed by message id
  const _replies = { 1:[], 2:[], 3:[] };

  let _nextId = 4;
  const _selected = new Set();

  return {
    getAll()       { return [..._messages]; },
    getCount()     { return _messages.length; },
    getSelected()  { return new Set(_selected); },
    isSelected(id) { return _selected.has(id); },

    toggleSelect(id) { _selected.has(id) ? _selected.delete(id) : _selected.add(id); },

    add({ email, phone, sender, gender, body }) {
      const now = new Date();
      const id = _nextId++;
      const msg = {
        id, email, phone, sender, gender, body,
        date: now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}),
        time: now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
      };
      _messages.unshift(msg);
      _replies[id] = [];
      return msg;
    },

    delete(id) {
      _messages = _messages.filter(m => m.id !== id);
      delete _replies[id];
      _selected.delete(id);
    },

    deleteSelected() {
      const ids = [..._selected];
      ids.forEach(id => this.delete(id));
      return ids;
    },

    getReplies(id)   { return [...(_replies[id] || [])]; },

    addReply(id, { text, fromClient = false }) {
      if (!_replies[id]) _replies[id] = [];
      const now = new Date();
      _replies[id].push({
        text, fromClient,
        time: now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
      });
    },
  };
})();

/* ══════════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════════ */
const PREVIEW = 150;
const trunc = t => t.length <= PREVIEW ? t : t.slice(0, PREVIEW) + '…';

let _toast;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toast);
  _toast = setTimeout(() => t.classList.remove('show'), 2800);
}

function openModal(msg) {
  document.getElementById('modalSender').textContent = `${msg.sender} — ${msg.date}`;
  document.getElementById('modalBody').textContent   = msg.body;
  document.getElementById('modalOverlay').classList.add('open');
}
document.getElementById('modalClose').addEventListener('click', () =>
  document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});

/* ══════════════════════════════════════════════════════════
   ADMIN RENDERER
══════════════════════════════════════════════════════════ */
function renderAdmin() {
  const list  = document.getElementById('admList');
  const msgs  = MessageStore.getAll();
  document.getElementById('admCount').textContent = msgs.length;
  document.getElementById('btnDelSel').disabled   = MessageStore.getSelected().size === 0;
  list.innerHTML = '';

  if (!msgs.length) {
    list.innerHTML = `<div style="text-align:center;padding:48px 0;color:var(--muted);font-size:.85rem">No messages</div>`;
    return;
  }

  msgs.forEach(msg => {
    const sel  = MessageStore.isSelected(msg.id);
    const long = msg.body.length > PREVIEW;
    const card = document.createElement('div');
    card.className = 'adm-card' + (sel ? ' selected' : '');
    card.dataset.id = msg.id;

    const replyCount = MessageStore.getReplies(msg.id).length;

    card.innerHTML = `
      <div class="adm-card-top">
        <div class="adm-meta">
          <div class="adm-date">
            <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${msg.date} &nbsp;·&nbsp; ${msg.time}
            ${replyCount ? `<span style="color:var(--green);margin-left:8px">↩ ${replyCount} repl${replyCount>1?'ies':'y'}</span>` : ''}
          </div>
          <div class="adm-tags">
            <span class="adm-tag">
              <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              ${msg.email}
            </span>
            <span class="adm-tag">
              <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
              ${msg.phone}
            </span>
          </div>
        </div>
        <div class="sel-dot" role="checkbox" aria-checked="${sel}" title="Select">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
      <div class="adm-sender">
        <div class="adm-avatar" style="background:${colorFor(msg.sender)}">
          <span style="font-family:var(--mono);font-size:.65rem;font-weight:700;color:#fff">${initials(msg.sender)}</span>
        </div>
        <div>
          <div class="adm-sname">${msg.sender}</div>
          <div class="adm-sgender">(${msg.gender})</div>
        </div>
      </div>
      <div class="adm-body">
        ${trunc(msg.body)}
        ${long ? `<button class="adm-read-more" data-id="${msg.id}"> Read More</button>` : ''}
      </div>`;

    list.appendChild(card);
  });
}

/* admin events */
document.getElementById('admList').addEventListener('click', e => {
  const dot = e.target.closest('.sel-dot');
  if (dot) {
    const card = dot.closest('.adm-card');
    const id   = Number(card.dataset.id);
    MessageStore.toggleSelect(id);
    card.classList.toggle('selected', MessageStore.isSelected(id));
    dot.setAttribute('aria-checked', MessageStore.isSelected(id));
    document.getElementById('btnDelSel').disabled = MessageStore.getSelected().size === 0;
    return;
  }
  const rm = e.target.closest('.adm-read-more');
  if (rm) {
    const msg = MessageStore.getAll().find(m => m.id === Number(rm.dataset.id));
    if (msg) openModal(msg);
  }
});

document.getElementById('btnDelSel').addEventListener('click', () => {
  const ids = [...MessageStore.getSelected()];
  ids.forEach(id => {
    const card = document.querySelector(`.adm-card[data-id="${id}"]`);
    if (card) {
      card.classList.add('deleting');
      card.addEventListener('animationend', () => { MessageStore.delete(id); renderAdmin(); }, { once: true });
    }
  });
  showToast(`${ids.length} message${ids.length > 1 ? 's' : ''} deleted`);
  // refresh client if open
  renderClientThreadList();
});

function admAddMessage() {
  const inp = document.getElementById('admComposeInput');
  const body = inp.value.trim();
  if (!body) return;
  MessageStore.add({ email:'admin@panel.com', phone:'N/A', sender:'Admin', gender:'N/A', body });
  inp.value = '';
  renderAdmin();
  renderClientThreadList();
  showToast('Message added');
}
document.getElementById('btnAdmAdd').addEventListener('click', admAddMessage);
document.getElementById('admComposeInput').addEventListener('keydown', e => { if(e.key==='Enter') admAddMessage(); });

document.querySelectorAll('.adm-nav-link').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.adm-nav-link').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
  });
});

/* ══════════════════════════════════════════════════════════
   CLIENT RENDERER
══════════════════════════════════════════════════════════ */
let _activeThreadId = null;

function renderClientThreadList() {
  const searchVal = document.getElementById('clSearch').value.toLowerCase();
  const list = document.getElementById('clThreadList');
  list.innerHTML = '';

  const msgs = MessageStore.getAll().filter(m =>
    !searchVal || m.sender.toLowerCase().includes(searchVal) || m.body.toLowerCase().includes(searchVal)
  );

  if (!msgs.length) {
    list.innerHTML = `<div style="text-align:center;padding:24px;color:var(--cl-muted);font-size:.78rem">No messages found</div>`;
    return;
  }

  msgs.forEach(msg => {
    const el = document.createElement('div');
    el.className = 'cl-thread' + (_activeThreadId === msg.id ? ' active' : '');
    el.dataset.id = msg.id;
    const replies = MessageStore.getReplies(msg.id);
    const lastText = replies.length ? replies[replies.length-1].text : msg.body;
    const color = colorFor(msg.sender);

    el.innerHTML = `
      <div class="cl-t-avatar" style="background:${color}">${initials(msg.sender)}</div>
      <div class="cl-t-info">
        <div class="cl-t-name">${msg.sender}</div>
        <div class="cl-t-preview">${trunc(lastText)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="cl-t-date">${msg.time || ''}</span>
        ${replies.length === 0 ? '<span class="cl-unread"></span>' : ''}
      </div>`;

    el.addEventListener('click', () => openThread(msg.id));
    list.appendChild(el);
  });
}

function openThread(id) {
  _activeThreadId = id;
  renderClientThreadList();

  const msg = MessageStore.getAll().find(m => m.id === id);
  if (!msg) return;

  // update header
  const hdr = document.getElementById('clChatHeader');
  hdr.style.display = 'flex';
  const av = document.getElementById('clChAvatar');
  av.style.background = colorFor(msg.sender);
  av.textContent = initials(msg.sender);
  document.getElementById('clChName').textContent = msg.sender;

  // hide new form, show reply form
  document.getElementById('clEmptyState').style.display  = 'none';
  document.getElementById('clConversation').style.display = 'flex';
  document.getElementById('clNewForm').style.display      = 'none';
  document.getElementById('clReplyForm').style.display    = 'block';

  renderConversation(msg);
}

function renderConversation(msg) {
  const convo = document.getElementById('clConversation');
  convo.innerHTML = '';

  // original message bubble
  convo.innerHTML += `<div class="cl-day-divider">${msg.date}</div>`;
  convo.innerHTML += `
    <div class="cl-bubble-row">
      <div class="cl-bubble-avatar" style="background:${colorFor(msg.sender)}">${initials(msg.sender)}</div>
      <div>
        <div class="cl-bubble">${msg.body}</div>
        <div class="cl-bubble-time">${msg.time || ''}</div>
      </div>
    </div>`;

  // replies
  MessageStore.getReplies(msg.id).forEach(r => {
    const cls = r.fromClient ? 'cl-bubble-row from-client' : 'cl-bubble-row';
    const avHtml = r.fromClient
      ? `<div class="cl-bubble-avatar" style="background:var(--cl-accent2)">ME</div>`
      : `<div class="cl-bubble-avatar" style="background:${colorFor(msg.sender)}">${initials(msg.sender)}</div>`;
    convo.innerHTML += `
      <div class="${cls}">
        ${avHtml}
        <div>
          <div class="cl-bubble">${r.text}</div>
          <div class="cl-bubble-time">${r.time}</div>
        </div>
      </div>`;
  });

  convo.scrollTop = convo.scrollHeight;
}

function showNewThreadForm() {
  _activeThreadId = null;
  document.getElementById('clChatHeader').style.display   = 'none';
  document.getElementById('clEmptyState').style.display   = 'none';
  document.getElementById('clConversation').style.display = 'none';
  document.getElementById('clNewForm').style.display      = 'block';
  document.getElementById('clReplyForm').style.display    = 'none';
  renderClientThreadList();
}

document.getElementById('btnNewThread').addEventListener('click', showNewThreadForm);

/* send new message from client */
document.getElementById('btnClSend').addEventListener('click', () => {
  const name    = document.getElementById('clName').value.trim();
  const gender  = document.getElementById('clGender').value;
  const email   = document.getElementById('clEmail').value.trim();
  const phone   = document.getElementById('clPhone').value.trim();
  const body    = document.getElementById('clMessage').value.trim();

  if (!name || !email || !body) { showToast('Please fill in Name, Email & Message'); return; }

  const msg = MessageStore.add({ email, phone: phone||'—', sender: name, gender, body });
  document.getElementById('clName').value = document.getElementById('clEmail').value =
    document.getElementById('clPhone').value = document.getElementById('clMessage').value = '';

  renderAdmin();
  renderClientThreadList();
  openThread(msg.id);
  showToast('Message sent!');
});

/* send reply */
document.getElementById('btnClReply').addEventListener('click', sendReply);
document.getElementById('clReplyMsg').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
});

function sendReply() {
  if (!_activeThreadId) return;
  const ta  = document.getElementById('clReplyMsg');
  const txt = ta.value.trim();
  if (!txt) return;

  MessageStore.addReply(_activeThreadId, { text: txt, fromClient: true });
  ta.value = '';

  const msg = MessageStore.getAll().find(m => m.id === _activeThreadId);
  renderConversation(msg);
  renderClientThreadList();
  renderAdmin(); // refresh reply count in admin
  showToast('Reply sent');
}

/* search */
document.getElementById('clSearch').addEventListener('input', renderClientThreadList);

/* ══════════════════════════════════════════════════════════
   VIEW SWITCHER
══════════════════════════════════════════════════════════ */
document.getElementById('btnAdminView').addEventListener('click', () => {
  document.getElementById('adminPanel').classList.add('visible');
  document.getElementById('clientPanel').classList.remove('visible');
  document.getElementById('btnAdminView').classList.add('active');
  document.getElementById('btnClientView').classList.remove('active');
  renderAdmin();
});

document.getElementById('btnClientView').addEventListener('click', () => {
  document.getElementById('clientPanel').classList.add('visible');
  document.getElementById('adminPanel').classList.remove('visible');
  document.getElementById('btnClientView').classList.add('active');
  document.getElementById('btnAdminView').classList.remove('active');
  renderClientThreadList();
  showNewThreadForm();
});

/* ── Boot ── */
renderAdmin();
</script>
</body>
</html>
