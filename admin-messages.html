<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdminPanel – Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a2f45;
    --accent: #e84040;
    --accent2: #7c5cfc;
    --text: #e8eaf0;
    --muted: #6b718a;
    --tag-bg: #2c2060;
    --tag-border: #5a4dbd;
    --green: #2ee89a;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  aside {
    width: 240px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 0;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 1rem;
    color: #f5c518;
    padding: 0 24px 28px;
    letter-spacing: .04em;
    border-bottom: 1px solid var(--border);
  }

  nav { padding: 20px 0; flex: 1; }

  nav a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 24px;
    color: var(--muted);
    text-decoration: none;
    font-size: .875rem;
    font-weight: 500;
    transition: color .18s, background .18s;
    cursor: pointer;
  }

  nav a:hover { color: var(--text); background: var(--surface2); }
  nav a.active { color: var(--text); background: var(--surface2); border-left: 3px solid var(--accent2); }

  nav a svg { flex-shrink: 0; }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  header {
    padding: 22px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .header-title {
    font-family: var(--font-mono);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: .03em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-title span.count {
    color: #f5c518;
    font-size: 1.05rem;
  }

  .btn-delete {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 9px 20px;
    font-family: var(--font-body);
    font-size: .8rem;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: .04em;
    text-transform: uppercase;
    transition: opacity .18s, transform .1s;
  }

  .btn-delete:hover { opacity: .85; }
  .btn-delete:active { transform: scale(.97); }
  .btn-delete:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Message List ── */
  .msg-list {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .msg-list::-webkit-scrollbar { width: 6px; }
  .msg-list::-webkit-scrollbar-track { background: transparent; }
  .msg-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 12px;
    font-size: .9rem;
  }

  /* ── Card ── */
  .msg-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
    animation: slideIn .3s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-card.selected {
    border-color: var(--accent2);
    box-shadow: 0 0 0 1px var(--accent2);
  }

  .msg-card.deleting {
    animation: fadeOut .35s ease forwards;
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: scale(.97); max-height: 0; padding: 0; margin: 0; }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 16px 20px 10px;
    gap: 12px;
  }

  .card-meta { display: flex; flex-direction: column; gap: 8px; flex: 1; }

  .date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: .78rem;
    font-family: var(--font-mono);
  }

  .contact-tags { display: flex; gap: 8px; flex-wrap: wrap; }

  .tag {
    background: var(--tag-bg);
    border: 1px solid var(--tag-border);
    border-radius: 5px;
    padding: 4px 12px;
    font-size: .78rem;
    font-family: var(--font-mono);
    display: flex;
    align-items: center;
    gap: 6px;
    color: #c4b8ff;
  }

  .tag svg { opacity: .7; }

  /* Checkbox / select dot */
  .select-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .18s, border-color .18s;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }

  .select-dot:hover { border-color: var(--accent); }
  .msg-card.selected .select-dot {
    background: var(--accent);
    border-color: var(--accent);
  }

  .select-dot svg { display: none; }
  .msg-card.selected .select-dot svg { display: block; }

  /* Sender */
  .sender-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sender-info { display: flex; flex-direction: column; gap: 2px; }
  .sender-name { font-size: .875rem; font-weight: 600; }
  .sender-gender { font-size: .75rem; color: var(--muted); }

  /* Message body */
  .msg-body {
    padding: 14px 20px 16px;
    font-size: .85rem;
    line-height: 1.65;
    color: #b0b5cc;
    border-top: 1px solid var(--border);
  }

  .read-more {
    color: #f5c518;
    font-weight: 600;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: var(--font-body);
    font-size: .85rem;
    transition: opacity .15s;
  }

  .read-more:hover { opacity: .75; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 540px;
    width: 90%;
    padding: 28px;
    position: relative;
    animation: modalIn .25s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .modal h3 {
    font-family: var(--font-mono);
    font-size: .95rem;
    margin-bottom: 16px;
    color: var(--text);
  }

  .modal p { font-size: .875rem; line-height: 1.7; color: #b0b5cc; }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    padding: 4px;
  }

  .modal-close:hover { color: var(--text); }

  /* ── Compose ── */
  .compose-bar {
    border-top: 1px solid var(--border);
    padding: 18px 32px;
    background: var(--surface);
    display: flex;
    gap: 12px;
  }

  .compose-bar input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: .875rem;
    outline: none;
    transition: border-color .18s;
  }

  .compose-bar input:focus { border-color: var(--accent2); }
  .compose-bar input::placeholder { color: var(--muted); }

  .btn-send {
    background: var(--accent2);
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 7px;
    font-family: var(--font-body);
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .18s;
  }

  .btn-send:hover { opacity: .85; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--green);
    color: #0a0a0a;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: .85rem;
    font-weight: 600;
    z-index: 200;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity .3s, transform .3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- Sidebar -->
<aside>
  <div class="logo">AdminPanel</div>
  <nav>
    <a href="#" data-page="dashboard">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="#" data-page="messages" class="active">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      View Messages
    </a>
    <a href="#" data-page="register">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
      Register Account
    </a>
    <a href="#" data-page="update">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Update Account
    </a>
    <a href="#" data-page="admins">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      View Admins
    </a>
  </nav>
</aside>

<!-- Main -->
<main>
  <header>
    <div class="header-title">
      Messages &nbsp;( Total : <span class="count" id="msgCount">0</span> )
    </div>
    <button class="btn-delete" id="btnDeleteSelected" disabled>Delete Selected</button>
  </header>

  <div class="msg-list" id="msgList"></div>

  <!-- Compose bar -->
  <div class="compose-bar">
    <input type="text" id="composeInput" placeholder="Type a quick message to inject…" />
    <button class="btn-send" id="btnSend">+ Add Message</button>
  </div>
</main>

<!-- Read-More Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h3 id="modalSender">Message</h3>
    <p id="modalBody"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   DATA STORE  –  JavaScript backend logic
═══════════════════════════════════════════════ */
const MessageStore = (() => {
  let _messages = [
    {
      id: 1,
      date: '17 Dec 2025',
      email: 'anas@gmail.com',
      phone: '0987654321',
      sender: 'Sk Anas',
      gender: 'Male',
      body: 'LorLorem, ipsum dolor sit amet consectetur adipisicing elit. Deleniti repellat sit numquam eaque dolor officiis ipsum distinctio nulla praesentium minus?',
    },
    {
      id: 2,
      date: '17 Dec 2025',
      email: 'anasbhai@gmail.com',
      phone: '1234567890',
      sender: 'Anas-2',
      gender: 'Male',
      body: 'LorLorem, ipsum dolor sit amet consectetur adipisicing elit. Deleniti repellat sit numquam eaque dolor officiis ipsum distinctio nulla praesentium minus? Lorem, ipsum dolor sit amet consectetur adi nulla consequuntur perspiciatis expedita nesciunt saepe distinctio voluptatibus laborum voluptate.',
    },
    {
      id: 3,
      date: '18 Dec 2025',
      email: 'zara@example.com',
      phone: '9876001234',
      sender: 'Zara Khan',
      gender: 'Female',
      body: 'Hello admin, I wanted to follow up on my earlier support request. The issue seems to persist even after the suggested fix. Could you please escalate this to the technical team? I appreciate your help.',
    },
  ];

  let _nextId = 4;
  const _selected = new Set();

  return {
    getAll()       { return [..._messages]; },
    getCount()     { return _messages.length; },
    getSelected()  { return new Set(_selected); },
    isSelected(id) { return _selected.has(id); },

    toggleSelect(id) {
      _selected.has(id) ? _selected.delete(id) : _selected.add(id);
    },

    add({ email, phone, sender, gender, body }) {
      const msg = {
        id: _nextId++,
        date: new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }),
        email, phone, sender, gender, body,
      };
      _messages.unshift(msg);
      return msg;
    },

    delete(id) {
      _messages = _messages.filter(m => m.id !== id);
      _selected.delete(id);
    },

    deleteSelected() {
      const ids = [..._selected];
      ids.forEach(id => this.delete(id));
      return ids;
    },

    clearSelection() { _selected.clear(); },
  };
})();

/* ═══════════════════════════════════════════════
   RENDERER
═══════════════════════════════════════════════ */
const PREVIEW_LIMIT = 160;

function truncate(text) {
  return text.length <= PREVIEW_LIMIT ? text : text.slice(0, PREVIEW_LIMIT) + '…';
}

function buildCard(msg) {
  const isSelected = MessageStore.isSelected(msg.id);
  const isLong     = msg.body.length > PREVIEW_LIMIT;

  const card = document.createElement('div');
  card.className = 'msg-card' + (isSelected ? ' selected' : '');
  card.dataset.id = msg.id;

  card.innerHTML = `
    <div class="card-header">
      <div class="card-meta">
        <div class="date-row">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${msg.date}
        </div>
        <div class="contact-tags">
          <span class="tag">
            <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            ${msg.email}
          </span>
          <span class="tag">
            <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
            ${msg.phone}
          </span>
        </div>
      </div>
      <div class="select-dot" role="checkbox" aria-checked="${isSelected}" title="Select">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>

    <div class="sender-row">
      <div class="avatar">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#6b718a" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>
      </div>
      <div class="sender-info">
        <span class="sender-name">${msg.sender}</span>
        <span class="sender-gender">(${msg.gender})</span>
      </div>
    </div>

    <div class="msg-body">
      <span class="preview-text">${truncate(msg.body)}</span>
      ${isLong ? `<button class="read-more" data-id="${msg.id}"> Read More</button>` : ''}
    </div>
  `;

  return card;
}

function render() {
  const list   = document.getElementById('msgList');
  const msgs   = MessageStore.getAll();
  const count  = msgs.length;

  document.getElementById('msgCount').textContent = count;
  document.getElementById('btnDeleteSelected').disabled = MessageStore.getSelected().size === 0;

  list.innerHTML = '';

  if (count === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="#2a2f45" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>No messages yet</span>
      </div>`;
    return;
  }

  msgs.forEach(msg => list.appendChild(buildCard(msg)));
}

/* ═══════════════════════════════════════════════
   EVENT HANDLERS
═══════════════════════════════════════════════ */

// Delegated click on message list
document.getElementById('msgList').addEventListener('click', e => {
  // Select dot
  const dot = e.target.closest('.select-dot');
  if (dot) {
    const card = dot.closest('.msg-card');
    const id   = Number(card.dataset.id);
    MessageStore.toggleSelect(id);
    card.classList.toggle('selected', MessageStore.isSelected(id));
    dot.setAttribute('aria-checked', MessageStore.isSelected(id));
    document.getElementById('btnDeleteSelected').disabled = MessageStore.getSelected().size === 0;
    return;
  }

  // Read More
  const rm = e.target.closest('.read-more');
  if (rm) {
    const id  = Number(rm.dataset.id);
    const msg = MessageStore.getAll().find(m => m.id === id);
    if (msg) openModal(msg);
    return;
  }
});

// Delete selected
document.getElementById('btnDeleteSelected').addEventListener('click', () => {
  const ids = [...MessageStore.getSelected()];
  ids.forEach(id => {
    const card = document.querySelector(`.msg-card[data-id="${id}"]`);
    if (card) {
      card.classList.add('deleting');
      card.addEventListener('animationend', () => {
        MessageStore.delete(id);
        render();
      }, { once: true });
    }
  });
  showToast(`${ids.length} message${ids.length > 1 ? 's' : ''} deleted`);
});

// Compose / add message
document.getElementById('btnSend').addEventListener('click', addMessage);
document.getElementById('composeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addMessage();
});

function addMessage() {
  const input = document.getElementById('composeInput');
  const body  = input.value.trim();
  if (!body) return;

  MessageStore.add({
    email:  'new@example.com',
    phone:  '0000000000',
    sender: 'New User',
    gender: 'Unknown',
    body,
  });

  input.value = '';
  render();
  showToast('Message added');
}

// Sidebar nav (visual only)
document.querySelectorAll('nav a').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    link.classList.add('active');
  });
});

/* ── Modal ── */
function openModal(msg) {
  document.getElementById('modalSender').textContent = `${msg.sender} — ${msg.date}`;
  document.getElementById('modalBody').textContent   = msg.body;
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});

/* ── Toast ── */
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── Boot ── */
render();
</script>
</body>
</html>
